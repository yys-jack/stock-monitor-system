# ─────────────────────────────────────────────────────────────
# stock-monitor-system CI/CD
# ─────────────────────────────────────────────────────────────
# 触发条件：
#   - push 到 main/develop/feature 分支
#   - PR 提交到 main/develop 分支
#   - 发布 tag (v*)
#
# Secrets 配置（仓库设置 → Secrets and variables → Actions）：
#   - DOCKER_USERNAME: Docker Hub 用户名
#   - DOCKER_PASSWORD: Docker Hub Access Token
#   - CODECOV_TOKEN: Codecov 令牌（可选）
# ─────────────────────────────────────────────────────────────

name: CI/CD

on:
  push:
    branches: [main, develop, feature/*]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.13'
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/stock-monitor-system

jobs:
  # ─────────────────────────────────────
  # 1️⃣ 代码质量检查
  # ─────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install lint tools
        run: |
          pip install --upgrade pip
          pip install ruff black mypy
      
      - name: Lint with Ruff
        run: ruff check .
      
      - name: Check formatting with Black
        run: black --check .
      
      - name: Type check with MyPy
        run: mypy src/ app/ --ignore-missing-imports || true

  # ─────────────────────────────────────
  # 2️⃣ 单元测试 + 覆盖率
  # ─────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      
      - name: Run tests
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov=app \
            --cov=scripts \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=0 || echo "Tests completed"
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────
  # 3️⃣ 构建 Docker 镜像
  # ─────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      # 登录 Docker Hub（仅当 secrets 存在时）
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: ${{ secrets.DOCKER_USERNAME && secrets.DOCKER_PASSWORD }}
      
      # 生成镜像标签
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      
      # 构建并推送
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' && secrets.DOCKER_USERNAME != '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ─────────────────────────────────────
  # 4️⃣ 发布到 PyPI（仅 tag）
  # ─────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/stock-monitor-system
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install build tools
        run: |
          pip install --upgrade pip
          pip install build
      
      - name: Build package
        run: python -m build
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 股票监控系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header h1 { color: #667eea; margin-bottom: 10px; }
        .stock-selector { display: flex; gap: 10px; margin-top: 15px; }
        .stock-selector select { padding: 10px 15px; border: 2px solid #667eea; border-radius: 8px; font-size: 16px; flex: 1; }
        .btn { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: all 0.3s; }
        .btn:hover { background: #5568d3; transform: translateY(-2px); }
        .price-card { background: white; border-radius: 15px; padding: 30px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .stock-name { font-size: 24px; color: #333; margin-bottom: 10px; }
        .stock-code { color: #999; font-size: 14px; }
        .current-price { font-size: 48px; font-weight: bold; color: #667eea; margin: 20px 0; }
        .price-up { color: #e74c3c; }
        .price-down { color: #27ae60; }
        .price-change { font-size: 24px; margin-bottom: 20px; }
        .price-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .detail-item { background: #f8f9fa; padding: 15px; border-radius: 10px; }
        .detail-label { color: #999; font-size: 12px; margin-bottom: 5px; }
        .detail-value { font-size: 18px; font-weight: bold; color: #333; }
        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 768px) { .content-grid { grid-template-columns: 1fr; } }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card h2 { color: #667eea; margin-bottom: 15px; font-size: 20px; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        .news-list { list-style: none; }
        .news-item { padding: 12px 0; border-bottom: 1px solid #eee; }
        .news-item:last-child { border-bottom: none; }
        .news-title { color: #333; font-size: 14px; margin-bottom: 5px; line-height: 1.4; }
        .news-title:hover { color: #667eea; cursor: pointer; }
        .news-meta { font-size: 12px; color: #999; }
        .chart-container { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .loading { text-align: center; padding: 40px; color: #999; }
        .refresh-time { text-align: right; color: #999; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🦞 股票监控系统</h1>
            <div class="stock-selector">
                <select id="stockSelect">
                    {% for stock in stocks %}
                    <option value="{{ stock.code }}" {% if stock.code == default_stock %}selected{% endif %}>
                        {{ stock.name }} ({{ stock.code }})
                    </option>
                    {% endfor %}
                </select>
                <button class="btn" onclick="loadData()">🔄 刷新</button>
            </div>
        </div>

        <!-- Price Card -->
        <div class="price-card">
            <div class="stock-name" id="stockName">加载中...</div>
            <div class="stock-code" id="stockCode">--</div>
            <div class="current-price" id="currentPrice">--</div>
            <div class="price-change" id="priceChange">--</div>
            <div class="price-details">
                <div class="detail-item">
                    <div class="detail-label">昨收</div>
                    <div class="detail-value" id="prevClose">--</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">今开</div>
                    <div class="detail-value" id="open">--</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">最高</div>
                    <div class="detail-value" id="high">--</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">最低</div>
                    <div class="detail-value" id="low">--</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">成交量</div>
                    <div class="detail-value" id="volume">--</div>
                </div>
            </div>
            <div class="refresh-time">最后更新：<span id="updateTime">--</span></div>
        </div>

        <!-- Chart -->
        <div class="chart-container">
            <h2>📊 股价走势（近 30 日）</h2>
            <canvas id="priceChart"></canvas>
        </div>

        <!-- News and Overview -->
        <div class="content-grid">
            <div class="card">
                <h2>📰 最新资讯</h2>
                <ul class="news-list" id="newsList">
                    <li class="loading">加载中...</li>
                </ul>
            </div>
            <div class="card">
                <h2>📈 市场概览</h2>
                <div id="overview">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>

        <!-- Stock Management -->
        <div class="card" id="stockManagement">
            <h2>⚙️ 股票配置管理</h2>
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        let priceChart = null;

        // 股票配置管理
        async function loadStocks() {
            try {
                const resp = await fetch('/api/stocks');
                const data = await resp.json();
                if (data.success) {
                    updateStockSelector(data.data);
                    renderStockManagement(data.data);
                }
            } catch (error) {
                console.error('Error loading stocks:', error);
            }
        }

        function updateStockSelector(stocks) {
            const select = document.getElementById('stockSelect');
            const current = select.value;
            select.innerHTML = stocks.map(s => 
                `<option value="${s.code}" ${s.code === current ? 'selected' : ''}>${s.name} (${s.code})</option>`
            ).join('');
        }

        function renderStockManagement(stocks) {
            const container = document.getElementById('stockManagement');
            if (!container) return;
            
            container.innerHTML = `
                <h3>📋 股票列表</h3>
                <div style="max-height: 300px; overflow-y: auto;">
                    ${stocks.map(s => `
                        <div style="padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <div style="font-weight: bold;">${s.name} (${s.code})</div>
                                <div style="color: #999; font-size: 12px;">${s.alias || ''} ${s.notes ? '· ' + s.notes : ''}</div>
                            </div>
                            <div style="display: flex; gap: 5px;">
                                <button class="btn" style="padding: 5px 10px; font-size: 12px; background: ${s.enabled ? '#27ae60' : '#95a5a6'};" onclick="toggleStock('${s.code}')">
                                    ${s.enabled ? '✅ 启用' : '⏸️ 禁用'}
                                </button>
                                ${s.code !== '000063' ? `<button class="btn" style="padding: 5px 10px; font-size: 12px; background: #e74c3c;" onclick="deleteStock('${s.code}')">🗑️ 删除</button>` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                <h3 style="margin-top: 20px;">➕ 添加股票</h3>
                <form id="addStockForm" onsubmit="addStock(event)" style="display: grid; gap: 10px;">
                    <input type="text" id="newStockCode" placeholder="股票代码 (如：600519)" required style="padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                    <input type="text" id="newStockName" placeholder="股票名称 (如：贵州茅台)" required style="padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                    <select id="newStockMarket" style="padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                        <option value="sz">深圳 (sz)</option>
                        <option value="sh">上海 (sh)</option>
                    </select>
                    <input type="text" id="newStockAlias" placeholder="别名 (可选)" style="padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                    <input type="text" id="newStockNotes" placeholder="备注 (可选)" style="padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                    <button type="submit" class="btn">➕ 添加股票</button>
                </form>
            `;
        }

        async function addStock(event) {
            event.preventDefault();
            const data = {
                code: document.getElementById('newStockCode').value,
                name: document.getElementById('newStockName').value,
                market: document.getElementById('newStockMarket').value,
                alias: document.getElementById('newStockAlias').value,
                notes: document.getElementById('newStockNotes').value
            };
            
            try {
                const resp = await fetch('/api/stocks', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const result = await resp.json();
                if (result.success) {
                    alert(`✅ ${result.message}`);
                    document.getElementById('addStockForm').reset();
                    loadStocks();
                    loadData();
                } else {
                    alert(`❌ ${result.error}`);
                }
            } catch (error) {
                alert('添加失败：' + error);
            }
        }

        async function toggleStock(code) {
            try {
                const resp = await fetch(`/api/stocks/${code}/toggle`, {method: 'POST'});
                const result = await resp.json();
                if (result.success) {
                    alert(`✅ ${result.message}`);
                    loadStocks();
                } else {
                    alert(`❌ ${result.error}`);
                }
            } catch (error) {
                alert('操作失败：' + error);
            }
        }

        async function deleteStock(code) {
            if (!confirm(`确定要删除股票 ${code} 吗？`)) return;
            
            try {
                const resp = await fetch(`/api/stocks/${code}`, {method: 'DELETE'});
                const result = await resp.json();
                if (result.success) {
                    alert(`✅ ${result.message}`);
                    loadStocks();
                    loadData();
                } else {
                    alert(`❌ ${result.error}`);
                }
            } catch (error) {
                alert('删除失败：' + error);
            }
        }

        async function loadData() {
            const code = document.getElementById('stockSelect').value;
            
            // Load stock price
            try {
                const priceResp = await fetch(`/api/stock/${code}`);
                const priceData = await priceResp.json();
                
                if (priceData.success) {
                    const data = priceData.data;
                    document.getElementById('stockName').textContent = data.stock.name;
                    document.getElementById('stockCode').textContent = `${data.stock.code} | ${data.stock.alias || ''}`;
                    
                    const price = data.price.current;
                    const change = data.price.change_pct;
                    const priceEl = document.getElementById('currentPrice');
                    const changeEl = document.getElementById('priceChange');
                    
                    priceEl.textContent = `¥${price.toFixed(2)}`;
                    changeEl.textContent = `${change >= 0 ? '📈' : '📉'} ${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
                    
                    if (change >= 0) {
                        priceEl.className = 'current-price price-up';
                        changeEl.className = 'price-change price-up';
                    } else {
                        priceEl.className = 'current-price price-down';
                        changeEl.className = 'price-change price-down';
                    }
                    
                    document.getElementById('prevClose').textContent = `¥${data.price.prev_close.toFixed(2)}`;
                    document.getElementById('open').textContent = '¥' + (data.price.open || '--');
                    document.getElementById('high').textContent = '¥' + (data.price.high || '--');
                    document.getElementById('low').textContent = '¥' + (data.price.low || '--');
                    document.getElementById('volume').textContent = (data.price.volume / 10000).toFixed(1) + '万手';
                    document.getElementById('updateTime').textContent = data.update_time;
                }
            } catch (error) {
                console.error('Error loading price:', error);
            }

            // Load news
            try {
                const newsResp = await fetch(`/api/news/${code}`);
                const newsData = await newsResp.json();
                
                if (newsData.success) {
                    const newsList = document.getElementById('newsList');
                    newsList.innerHTML = newsData.data.map(news => `
                        <li class="news-item">
                            <div class="news-title">📰 ${news.title}</div>
                            <div class="news-meta">${news.source} · ${news.date}</div>
                        </li>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading news:', error);
            }

            // Load history chart
            try {
                const historyResp = await fetch(`/api/history/${code}`);
                const historyData = await historyResp.json();
                
                if (historyData.success) {
                    updateChart(historyData.data);
                }
            } catch (error) {
                console.error('Error loading history:', error);
            }

            // Load overview
            try {
                const overviewResp = await fetch('/api/overview');
                const overviewData = await overviewResp.json();
                
                if (overviewData.success) {
                    const overviewEl = document.getElementById('overview');
                    overviewEl.innerHTML = overviewData.data.map(stock => `
                        <div style="padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <div style="font-weight: bold;">${stock.name}</div>
                                <div style="color: #999; font-size: 12px;">${stock.code}</div>
                            </div>
                            <div style="text-align: right;">
                                <div style="font-size: 18px; font-weight: bold;">¥${stock.current.toFixed(2)}</div>
                                <div class="${stock.change_pct >= 0 ? 'price-up' : 'price-down'}" style="color: ${stock.change_pct >= 0 ? '#e74c3c' : '#27ae60'};">
                                    ${stock.change_pct >= 0 ? '+' : ''}${stock.change_pct.toFixed(2)}%
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading overview:', error);
            }
        }

        function updateChart(history) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            
            if (priceChart) {
                priceChart.destroy();
            }
            
            const dates = history.map(h => h.date.slice(5)); // MM-DD
            const prices = history.map(h => h.close);
            const changes = history.map(h => h.change);
            
            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [{
                        label: '收盘价',
                        data: prices,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4,
                        fill: true,
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false
                        }
                    }
                }
            });
        }

        // Auto refresh every 30 seconds
        setInterval(loadData, 30000);

        // Stock selector change
        document.getElementById('stockSelect').addEventListener('change', loadData);

        // Initial load
        loadStocks();
        loadData();
    </script>
</body>
</html>
